<body>

<!-- First Navigation Bar ------------------------------------------------------------------------------------->

        <div class="contact-info">
            <div class="contact-item">
                <i class="la la-envelope"></i>
                <span>toplifeprise@gmail.com</span>
            </div>
            <div class="contact-item">
                <a href="tel:+260964729745">
                    <i class="la la-phone"></i>

                </a>

        </div>
    </nav>
    
<!-- Second Navigation Bar --------------------------------------------------------------------------------------->
<nav id="second-nav">
    <div class="logo">
        <img src="assets/images/logo-trans-com.png" alt="Company Logo" class="logo-img">

    <ul id="menu-list">

    </ul>
    <div class="menu-icon">
        <i class="las la-bars" onclick="toggleMenu()"></i>
    </div>
</nav>


    <script>
        let menuList = document.getElementById("menu-list")
        menuList.style.maxHeight = "0px";

        function toggleMenu(){
            if(menuList.style.maxHeight == "0px")
            {
                menuList.style.maxHeight = "300px";
            }
            else{
                menuList.style.maxHeight = "0px";
            }
        }
        
    </script>
